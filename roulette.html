<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>おきなわ、何食べる？</title>
    <style>
        /* 極限まで淡くしたミルキーなパステルグラデーション */
        body {
            font-family: "Hiragino Maru Gothic ProN", "Noto Sans JP", "Ubuntu", sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #f0f9ff 0%, #fff1f2 100%);
            background-attachment: fixed;
            color: #5c677d;
            padding: 20px 10px;
            margin: 0;
        }
        
        /* メインの白いカード（透明感のある白） */
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            max-width: 450px;
            margin: 0 auto;
            padding: 25px 20px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 183, 202, 0.15);
            border: 2px solid #ffffff;
        }
        
        h1 { 
            font-size: 21px; 
            color: #ff9ebb; /* 優しいパステルピンク */
            margin-top: 0;
            text-shadow: 1px 1px 0px #fff;
        }
        
        /* 深夜モードのスイッチ（マイルドなパープル・ブルー系） */
        .midnight-toggle-box {
            background: #f5f3ff;
            padding: 12px;
            border-radius: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #6d28d9;
            font-size: 14px;
            border: 1px solid #ede9fe;
        }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #e2e8f0; transition: .3s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #a78bfa; }
        input:checked + .slider:before { transform: translateX(24px); }

        /* セクション・フォーム */
        .section-title {
            font-size: 14px;
            font-weight: bold;
            color: #7dd3fc; /* 淡いパステルブルー */
            text-align: left;
            margin: 25px 0 10px 0;
            padding-left: 6px;
            border-left: 4px solid #7dd3fc;
        }
        .filter-section, .add-section {
            background: #fffafb; /* ほんのり優しい白ピンク */
            padding: 15px;
            border-radius: 20px;
            text-align: left;
            border: 1px solid #fff1f2;
        }
        .filter-group { margin-bottom: 12px; }
        .filter-group:last-child { margin-bottom: 0; }
        label { display: block; font-size: 13px; font-weight: bold; color: #94a3b8; margin-bottom: 6px; }
        
        /* 入力欄や選択ボックス */
        select, input[type="text"] {
            width: 100%; padding: 12px; font-size: 15px; border: 2px solid #f1f5f9;
            border-radius: 15px; background-color: white; box-sizing: border-box;
            color: #5c677d;
            font-family: inherit;
        }
        select:focus, input[type="text"]:focus { border-color: #7dd3fc; outline: none; }

        /* 結果表示 */
        .result-box {
            background: linear-gradient(135deg, #f0f9ff 0%, #fff1f2 100%);
            border-radius: 24px; padding: 25px 20px; margin: 15px 0;
            min-height: 100px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 2px dashed #ffffff;
        }
        #result-name { font-size: 28px; font-weight: bold; color: #ff9ebb; text-shadow: 1px 1px 0 #fff; }
        #result-meta { font-size: 13px; color: #94a3b8; margin-top: 8px; font-weight: bold; }

        /* ボタン */
        .btn-main {
            background: linear-gradient(135deg, #ffb7ca, #ffa6c5); color: white; border: none;
            width: 100%; padding: 16px; font-size: 18px; font-weight: bold; border-radius: 30px;
            cursor: pointer; box-shadow: 0 4px 15px rgba(255, 183, 202, 0.4); transition: transform 0.1s;
            font-family: inherit;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.05);
        }
        .btn-main:active { transform: scale(0.97); }
        
        .btn-add { 
            background: linear-gradient(135deg, #bae6fd, #7dd3fc); 
            padding: 12px; font-size: 15px; margin-top: 10px; 
            box-shadow: 0 4px 12px rgba(125, 211, 252, 0.2); 
            border: none; width: 100%; font-weight: bold; border-radius: 30px; color: white; cursor: pointer;
            font-family: inherit;
        }
        .btn-add:active { transform: scale(0.97); }
        
        /* 編集中の保存ボタン用スタイル */
        .btn-edit-mode {
            background: linear-gradient(135deg, #fed7aa, #f97316) !important;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.2) !important;
        }

        /* リスト管理 */
        .shop-list { max-height: 250px; overflow-y: auto; background: #fff; border: 1px solid #f8fafc; border-radius: 20px; padding: 10px; margin-top: 10px; }
        .shop-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 6px; border-bottom: 1px solid #f8fafc; font-size: 14px; text-align: left; }
        .shop-item:last-child { border-bottom: none; }
        .shop-info { flex-grow: 1; padding-right: 10px; }
        .shop-buttons { display: flex; gap: 4px; }
        
        /* リストの小さなボタン */
        .action-btn { border: none; padding: 6px 10px; font-size: 12px; border-radius: 20px; cursor: pointer; color: white; font-weight: bold; font-family: inherit; }
        .btn-status-toggle { background: #bae6fd; color: #0369a1; box-shadow: 0 2px 6px rgba(186, 230, 253, 0.3); }
        .btn-edit { background: #fed7aa; color: #ea580c; }
        .btn-delete { background: #cbd5e1; color: #64748b; }
    </style>
</head>
<body>

<div class="container">
    <h1>ふたりの沖縄ごはんルーレット</h1>
    
    <div class="midnight-toggle-box">
        <span>🌙 深夜営業の店だけで選ぶモード</span>
        <label class="switch">
            <input type="checkbox" id="midnight-mode-toggle">
            <span class="slider"></span>
        </label>
    </div>

    <div class="result-box">
        <div id="result-name">？？？</div>
        <div id="result-meta">ボタンを押してね</div>
    </div>
    <button onclick="spinRoulette()" class="btn-main">ルーレットを回す</button>

    <div class="section-title">🔍 通常時の条件絞り込み</div>
    <div class="filter-section">
        <div class="filter-group">
            <label>📍 エリア</label>
            <select id="area-select">
                <option value="すべて">どこでも</option>
                <option value="南部">南部</option>
                <option value="中部">中部</option>
                <option value="北部">北部</option>
            </select>
        </div>
        <div class="filter-group">
            <label>⏰ 時間帯</label>
            <select id="time-select">
                <option value="すべて">いつでも</option>
                <option value="朝">朝</option>
                <option value="昼">昼</option>
                <option value="夜">夜</option>
                <option value="深夜">深夜</option>
            </select>
        </div>
        <div class="filter-group">
            <label>🍱 ジャンル</label>
            <select id="genre-select">
                <option value="すべて">なんでも</option>
                <option value="ごはん">ごはん（定食・丼もの）</option>
                <option value="麺">麺（沖縄そば・ラーメン）</option>
                <option value="パン・軽食">パン・軽食（バーガー等）</option>
                <option value="おやつ">おやつ（カフェ・スイーツ）</option>
                <option value="その他">その他</option>
            </select>
        </div>
        <div class="filter-group">
            <label>❤️ ステータス</label>
            <select id="status-select">
                <option value="すべて">両方から選ぶ</option>
                <option value="行きたい">行きたいところ</option>
                <option value="行った">行ったことがある</option>
            </select>
        </div>
    </div>

    <div class="section-title" id="form-title">✍️ 新しいお店を追加する</div>
    <div class="add-section">
        <div class="filter-group">
            <label>店名</label>
            <input type="text" id="new-shop-name" placeholder="お店の名前を入力">
        </div>
        <div class="filter-group">
            <label>エリア</label>
            <select id="new-shop-area">
                <option value="南部">南部</option><option value="中部">中部</option><option value="北部">北部</option>
            </select>
        </div>
        <div class="filter-group">
            <label>時間帯</label>
            <select id="new-shop-time">
                <option value="夜">夜</option><option value="昼">昼</option><option value="朝">朝</option><option value="深夜">深夜</option>
            </select>
        </div>
        <div class="filter-group">
            <label>ジャンル</label>
            <select id="new-shop-genre">
                <option value="ごはん">ごはん</option><option value="麺">麺</option><option value="パン・軽食">パン・軽食</option><option value="おやつ">おやつ</option><option value="その他">その他</option>
            </select>
        </div>
        <div class="filter-group">
            <label>ステータス</label>
            <select id="new-shop-status">
                <option value="行きたい">行きたいところ</option><option value="行った">行ったことがある</option>
            </select>
        </div>
        <button onclick="handleSubmit()" id="submit-btn" class="btn-add">リストに追加する</button>
    </div>

    <div class="section-title">📋 登録済みのお店一覧</div>
    <div class="shop-list" id="shop-list-container"></div>
</div>

<script>
    // サンプルデータ（おやつデータの追加）
    const defaultShops = [
        { name: "首里そば", area: "南部", time: "昼", genre: "麺", status: "行った" },
        { name: "ブルーシールアイス", area: "中部", time: "昼", genre: "おやつ", status: "行った" },
        { name: "ハイウェイ食堂", area: "南部", time: "深夜", genre: "ごはん", status: "行った" },
        { name: "キャプテンカンガルー", area: "北部", time: "昼", genre: "パン・軽食", status: "行きたい" }
    ];

    let gourmetDatabase = JSON.parse(localStorage.getItem('gourmetDatabase5')) || defaultShops;
    let editIndex = null; 

    function saveToStorage() { localStorage.setItem('gourmetDatabase5', JSON.stringify(gourmetDatabase)); }

    function renderShopList() {
        const container = document.getElementById("shop-list-container");
        container.innerHTML = "";
        
        gourmetDatabase.forEach((shop, index) => {
            const item = document.createElement("div");
            item.className = "shop-item";
            
            const statusLabel = shop.status === "行った" ? "💖行った" : "📌行きたい";
            
            item.innerHTML = `
                <div class="shop-info">
                    <strong style="color:#4a5568;">${shop.name}</strong><br>
                    <small style="color:#94a3b8; font-weight:bold;">${shop.area} / ${shop.time} / ${shop.genre} / ${statusLabel}</small>
                </div>
                <div class="shop-buttons">
                    <button onclick="toggleStatus(${index})" class="action-btn btn-status-toggle">
                        ${shop.status === "行った" ? "未訪問" : "行った"}
                    </button>
                    <button onclick="startEdit(${index})" class="action-btn btn-edit">編集</button>
                    <button onclick="deleteShop(${index})" class="action-btn btn-delete">削除</button>
                </div>
            `;
            container.appendChild(item);
        });
    }

    function handleSubmit() {
        const nameInput = document.getElementById("new-shop-name");
        const name = nameInput.value.trim();
        const area = document.getElementById("new-shop-area").value;
        const time = document.getElementById("new-shop-time").value;
        const genre = document.getElementById("new-shop-genre").value;
        const status = document.getElementById("new-shop-status").value;

        if (!name) { alert("お店の名前を入力してね！"); return; }

        if (editIndex === null) {
            gourmetDatabase.push({ name, area, time, genre, status });
            alert(`「${name}」を追加したよ！`);
        } else {
            gourmetDatabase[editIndex] = { name, area, time, genre, status };
            alert(`「${name}」の情報を更新したよ！`);
            resetForm();
        }

        saveToStorage();
        renderShopList();
        nameInput.value = "";
    }

    function startEdit(index) {
        editIndex = index;
        const shop = gourmetDatabase[index];

        document.getElementById("new-shop-name").value = shop.name;
        document.getElementById("new-shop-area").value = shop.area;
        document.getElementById("new-shop-time").value = shop.time;
        document.getElementById("new-shop-genre").value = shop.genre;
        document.getElementById("new-shop-status").value = shop.status;

        document.getElementById("form-title").innerText = "📝 お店の情報を編集する";
        const submitBtn = document.getElementById("submit-btn");
        submitBtn.innerText = "変更を保存する";
        submitBtn.classList.add("btn-edit-mode");

        document.getElementById("new-shop-name").focus();
    }

    function resetForm() {
        editIndex = null;
        document.getElementById("form-title").innerText = "✍️ 新しいお店を追加する";
        const submitBtn = document.getElementById("submit-btn");
        submitBtn.innerText = "リストに追加する";
        submitBtn.classList.remove("btn-edit-mode");
    }

    function toggleStatus(index) {
        gourmetDatabase[index].status = gourmetDatabase[index].status === "行った" ? "行きたい" : "行った";
        saveToStorage();
        renderShopList();
    }

    function deleteShop(index) {
        if (confirm(`「${gourmetDatabase[index].name}」を削除してもいい？`)) {
            if (editIndex === index) resetForm(); 
            gourmetDatabase.splice(index, 1);
            saveToStorage();
            renderShopList();
        }
    }

    let audioCtx = null;
    function playSound(type) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        if (type === 'drum') {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(120 + Math.random() * 30, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'cymbal') {
            let bufferSize = audioCtx.sampleRate * 0.5;
            let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            let data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
            let noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            let filter = audioCtx.createBiquadFilter();
            filter.type = 'highpass';
            filter.frequency.value = 800;
            let gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start();
        }
    }

    function spinRoulette() {
        const isMidnightMode = document.getElementById("midnight-mode-toggle").checked;
        const areaFilter = document.getElementById("area-select").value;
        const timeFilter = document.getElementById("time-select").value;
        const genreFilter = document.getElementById("genre-select").value;
        const statusFilter = document.getElementById("status-select").value;

        const filteredList = gourmetDatabase.filter(item => {
            if (isMidnightMode) {
                return item.time === "深夜";
            } else {
                const matchArea = (areaFilter === "すべて" || item.area === areaFilter);
                const matchTime = (timeFilter === "すべて" || item.time === timeFilter);
                const matchGenre = (genreFilter === "すべて" || item.genre === genreFilter);
                const matchStatus = (statusFilter === "すべて" || item.status === statusFilter);
                return matchArea && matchTime && matchGenre && matchStatus;
            }
        });

        const nameDiv = document.getElementById("result-name");
        const metaDiv = document.getElementById("result-meta");

        if (filteredList.length === 0) {
            nameDiv.innerText = "見つかりません…";
            metaDiv.innerText = isMidnightMode ? "「深夜」のお店が登録されていません" : "条件を少しゆるめてみてね";
            return;
        }

        let count = 0;
        const totalSpins = 15;
        const interval = setInterval(() => {
            const randomIndex = Math.floor(Math.random() * filteredList.length);
            const currentItem = filteredList[randomIndex];
            nameDiv.innerText = currentItem.name;
            metaDiv.innerText = `[${currentItem.area}] ${currentItem.genre} (${currentItem.status})`;
            
            count++;
            if (count < totalSpins) {
                playSound('drum'); 
            } else {
                clearInterval(interval);
                playSound('cymbal'); 
                metaDiv.innerText = isMidnightMode ? "🌙 深夜の救世主ナビ！" : `[${currentItem.area}] ${currentItem.genre} (${currentItem.status}) ✨`;
            }
        }, 80);
    }

    renderShopList();
</script>

</body>
</html>

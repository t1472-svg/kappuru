<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>おきなわ、何食べる？</title>
    <!-- ⚡️ Supabaseライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: "Hiragino Maru Gothic ProN", "Noto Sans JP", "Ubuntu", sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #f0f9ff 0%, #fff1f2 100%);
            background-attachment: fixed;
            color: #5c677d;
            padding: 20px 10px;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            max-width: 450px;
            margin: 0 auto;
            padding: 25px 20px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 183, 202, 0.15);
            border: 2px solid #ffffff;
            position: relative;
        }
        .version-tag {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 11px;
            color: #cbd5e1;
            font-weight: bold;
            background: #f8fafc;
            padding: 2px 8px;
            border-radius: 10px;
        }
        h1 { 
            font-size: 21px; 
            color: #ff9ebb;
            margin-top: 10px;
            text-shadow: 1px 1px 0px #fff;
        }
        .chain-toggle-box {
            background: #fffbeb;
            padding: 12px;
            border-radius: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #d97706;
            font-size: 14px;
            border: 1px solid #fef3c7;
        }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #e2e8f0; transition: .3s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #ffb7ca; }
        input:checked + .slider:before { transform: translateX(24px); }

        .section-title {
            font-size: 14px;
            font-weight: bold;
            color: #7dd3fc;
            text-align: left;
            margin: 25px 0 10px 0;
            padding-left: 6px;
            border-left: 4px solid #7dd3fc;
        }
        .filter-section, .add-section {
            background: #fffafb;
            padding: 15px;
            border-radius: 20px;
            text-align: left;
            border: 1px solid #fff1f2;
        }
        .filter-group { margin-bottom: 12px; }
        .filter-group:last-child { margin-bottom: 0; }
        label { display: block; font-size: 13px; font-weight: bold; color: #94a3b8; margin-bottom: 6px; }
        
        select, input[type="text"] {
            width: 100%; padding: 12px; font-size: 15px; border: 2px solid #f1f5f9;
            border-radius: 15px; background-color: white; box-sizing: border-box;
            color: #5c677d;
            font-family: inherit;
        }
        select:focus, input[type="text"]:focus { border-color: #7dd3fc; outline: none; }

        .checkbox-group {
            display: flex;
            gap: 12px;
            background: white;
            padding: 10px;
            border: 2px solid #f1f5f9;
            border-radius: 15px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            color: #5c677d;
            cursor: pointer;
            margin-bottom: 0;
        }
        .result-box {
            background: linear-gradient(135deg, #f0f9ff 0%, #fff1f2 100%);
            border-radius: 24px; padding: 25px 20px; margin: 15px 0;
            min-height: 100px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 2px dashed #ffffff;
        }
        #result-name { font-size: 28px; font-weight: bold; color: #ff9ebb; text-shadow: 1px 1px 0 #fff; }
        #result-meta { font-size: 13px; color: #94a3b8; margin-top: 8px; font-weight: bold; }

        .btn-main {
            background: linear-gradient(135deg, #ffb7ca, #ffa6c5); color: white; border: none;
            width: 100%; padding: 16px; font-size: 18px; font-weight: bold; border-radius: 30px;
            cursor: pointer; box-shadow: 0 4px 15px rgba(255, 183, 202, 0.4); transition: transform 0.1s;
            font-family: inherit;
        }
        .btn-main:active { transform: scale(0.97); }
        .btn-add { 
            background: linear-gradient(135deg, #bae6fd, #7dd3fc); 
            padding: 12px; font-size: 15px; margin-top: 10px; 
            box-shadow: 0 4px 12px rgba(125, 211, 252, 0.2); 
            border: none; width: 100%; font-weight: bold; border-radius: 30px; color: white; cursor: pointer;
            font-family: inherit;
        }
        .btn-add:active { transform: scale(0.97); }

        .shop-list { max-height: 250px; overflow-y: auto; background: #fff; border: 1px solid #f8fafc; border-radius: 20px; padding: 10px; margin-top: 10px; }
        .shop-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 6px; border-bottom: 1px solid #f8fafc; font-size: 14px; text-align: left; }
        .shop-item:last-child { border-bottom: none; }
        .shop-info { flex-grow: 1; padding-right: 10px; }
        .shop-buttons { display: flex; gap: 6px; }
        .action-btn { border: none; padding: 6px 12px; font-size: 12px; border-radius: 20px; cursor: pointer; color: white; font-weight: bold; font-family: inherit; }
        .btn-status-toggle { background: #bae6fd; color: #0369a1; }
        .btn-delete { background: #cbd5e1; color: #64748b; }
    </style>
</head>
<body>

<div class="container">
    <!-- ⚡️ バージョン更新 -->
    <div class="version-tag">ver 1.2</div>

    <h1>ふたりの沖縄ごはんルーレット</h1>
    
    <div class="chain-toggle-box">
        <span>🍔 チェーン店だけで選ぶモード</span>
        <label class="switch">
            <input type="checkbox" id="chain-mode-toggle">
            <span class="slider"></span>
        </label>
    </div>

    <div class="result-box">
        <div id="result-name">？？？</div>
        <div id="result-meta">ボタンを押してね</div>
    </div>
    <button onclick="spinRoulette()" class="btn-main">ルーレットを回す</button>

    <div class="section-title">🔍 通常時の条件絞り込み</div>
    <div class="filter-section">
        <div class="filter-group">
            <label>📍 エリア</label>
            <select id="area-select">
                <option value="すべて">どこでも</option>
                <option value="南部">南部</option>
                <option value="中部">中部</option>
                <option value="北部">北部</option>
            </select>
        </div>
        <div class="filter-group">
            <label>⏰ 時間帯（複数えらべる！）</label>
            <div class="checkbox-group">
                <label class="checkbox-label"><input type="checkbox" id="filter-time-morning" value="朝" checked> 朝</label>
                <label class="checkbox-label"><input type="checkbox" id="filter-time-lunch" value="昼" checked> 昼</label>
                <label class="checkbox-label"><input type="checkbox" id="filter-time-dinner" value="夜" checked> 夜</label>
            </div>
        </div>
        <div class="filter-group">
            <label>🍱 ジャンル</label>
            <select id="genre-select">
                <option value="すべて">なんでも</option>
                <option value="ごはん">ごはん</option>
                <option value="麺">麺</option>
                <option value="パン・軽食">パン・軽食</option>
                <option value="その他">その他</option>
            </select>
        </div>
        <div class="filter-group">
            <label>❤️ ステータス</label>
            <select id="status-select">
                <option value="すべて">両方から選ぶ</option>
                <option value="行きたい">行きたいところ</option>
                <option value="行った">行ったことがある</option>
            </select>
        </div>
    </div>

    <div class="section-title">✍️ 新しいお店を追加する</div>
    <div class="add-section">
        <div class="filter-group">
            <label>店名</label>
            <input type="text" id="new-shop-name" placeholder="お店の名前を入力">
        </div>
        <div class="filter-group" style="display: flex; gap: 20px; margin-top: 10px;">
            <label style="display: flex; align-items: center; gap: 6px; font-size: 14px; color: #b45309;">
                <input type="checkbox" id="new-shop-is-chain"> 🍔 チェーン店
            </label>
        </div>
        <div class="filter-group">
            <label>エリア</label>
            <select id="new-shop-area">
                <option value="南部">南部</option><option value="中部">中部</option><option value="北部">北部</option>
            </select>
        </div>
        <div class="filter-group">
            <label>時間帯（複数えらべる！）</label>
            <div class="checkbox-group">
                <label class="checkbox-label"><input type="checkbox" id="add-time-morning" value="朝"> 朝</label>
                <label class="checkbox-label"><input type="checkbox" id="add-time-lunch" value="昼" checked> 昼</label>
                <label class="checkbox-label"><input type="checkbox" id="add-time-dinner" value="夜" checked> 夜</label>
            </div>
        </div>
        <div class="filter-group">
            <label>ジャンル</label>
            <select id="new-shop-genre">
                <option value="ごはん">ごはん</option><option value="麺">麺</option><option value="パン・軽食">パン・軽食</option><option value="その他">その他</option>
            </select>
        </div>
        <div class="filter-group">
            <label>ステータス</label>
            <select id="new-shop-status">
                <option value="行きたい">行きたいところ</option><option value="行った">行ったことがある</option>
            </select>
        </div>
        <button onclick="addShop()" class="btn-add">リストに追加する</button>
    </div>

    <div class="section-title">📋 登録済みのお店一覧</div>
    <div class="shop-list" id="shop-list-container"></div>
</div>

<script>
    const SUPABASE_URL = "https://lunmckpbtdcdlrcvhrog.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Ft2zusAtDbD4UrjXGuhUsQ_xoS5vEqy";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let gourmetDatabase = [];

    async function initApp() {
        await fetchShops();
        renderShopList();

        _supabase
            .channel('public:okinawa_places')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'okinawa_places' }, async () => {
                await fetchShops();
                renderShopList();
            })
            .subscribe();
    }

    // ⚡️ どんなデータが入っていても絶対に途中で止まらないように超安全設計に修正
    async function fetchShops() {
        const { data, error } = await _supabase
            .from('okinawa_places')
            .select('*')
            .order('created_at', { ascending: false });
        
        if (error) {
            console.error("データ取得エラー:", error);
            return;
        }

        gourmetDatabase = data.map(item => {
            let info = { area: "南部", time: ["昼"], genre: "ごはん", status: "行きたい", isChain: false };
            
            // JSONの復元に失敗しても初期値でカバーする
            if (item.notes) {
                try {
                    info = JSON.parse(item.notes);
                } catch(e) {
                    console.error("JSON解析に失敗したため初期値を使用します:", e);
                }
            }

            // 時間帯データが文字列だった場合の変換
            let timeArray = [];
            if (Array.isArray(info.time)) {
                timeArray = info.time;
            } else if (typeof info.time === 'string') {
                timeArray = info.time ? info.time.split(',') : ["昼"];
            } else {
                timeArray = ["昼"];
            }

            return {
                id: item.id,
                name: item.name || "無名のお店",
                area: info.area || "南部",
                time: timeArray,
                genre: info.genre || item.category || "ごはん",
                status: info.status || "行きたい",
                isChain: !!info.isChain
            };
        });
    }

    function renderShopList() {
        const container = document.getElementById("shop-list-container");
        container.innerHTML = "";
        
        if (gourmetDatabase.length === 0) {
            container.innerHTML = "<div style='text-align:center;color:#94a3b8;padding:20px;font-size:14px;'>お店がまだ登録されていません</div>";
            return;
        }

        gourmetDatabase.forEach((shop, index) => {
            const item = document.createElement("div");
            item.className = "shop-item";
            
            const statusLabel = shop.status === "行った" ? "💖行った" : "📌行きたい";
            const chainBadge = shop.isChain ? " <span style='color:#f59e0b;'>[チェーン]</span>" : "";
            const timeLabel = Array.isArray(shop.time) ? shop.time.join('・') : "昼";
            
            item.innerHTML = `
                <div class="shop-info">
                    <strong style="color:#4a5568;">${shop.name}</strong>${chainBadge}<br>
                    <small style="color:#94a3b8; font-weight:bold;">${shop.area} / ${timeLabel} / ${shop.genre} / ${statusLabel}</small>
                </div>
                <div class="shop-buttons">
                    <button onclick="toggleStatus(${index})" class="action-btn btn-status-toggle">
                        ${shop.status === "行った" ? "未訪問に" : "行った！"}
                    </button>
                    <button onclick="deleteShop(${index})" class="action-btn btn-delete">削除</button>
                </div>
            `;
            container.appendChild(item);
        });
    }

    async function addShop() {
        const nameInput = document.getElementById("new-shop-name");
        const name = nameInput.value.trim();
        const isChain = document.getElementById("new-shop-is-chain").checked;
        const area = document.getElementById("new-shop-area").value;
        const genre = document.getElementById("new-shop-genre").value;
        const status = document.getElementById("new-shop-status").value;

        const selectedTimes = [];
        if (document.getElementById("add-time-morning").checked) selectedTimes.push("朝");
        if (document.getElementById("add-time-lunch").checked) selectedTimes.push("昼");
        if (document.getElementById("add-time-dinner").checked) selectedTimes.push("夜");

        if (!name) { alert("お店の名前を入力してね！"); return; }
        if (selectedTimes.length === 0) { alert("時間帯を1つ以上選んでね！"); return; }

        const extraData = JSON.stringify({ area, time: selectedTimes, genre, status, isChain });

        const { error } = await _supabase
            .from('okinawa_places')
            .insert([{ name: name, category: genre, notes: extraData }]);

        if (error) {
            alert("データの保存に失敗しました…");
            return;
        }

        nameInput.value = "";
        document.getElementById("new-shop-is-chain").checked = false;
        alert(`「${name}」を追加したよ！`);
    }

    async function toggleStatus(index) {
        const shop = gourmetDatabase[index];
        const newStatus = shop.status === "行った" ? "行きたい" : "行った";
        
        const updatedData = JSON.stringify({
            area: shop.area,
            time: shop.time,
            genre: shop.genre,
            status: newStatus,
            isChain: shop.isChain
        });

        const { error } = await _supabase
            .from('okinawa_places')
            .update({ notes: updatedData })
            .eq('id', shop.id);

        if (error) console.error(error);
    }

    async function deleteShop(index) {
        const shop = gourmetDatabase[index];
        if (confirm(`「${shop.name}」を削除してもいい？`)) {
            const { error } = await _supabase
                .from('okinawa_places')
                .delete()
                .eq('id', shop.id);

            if (error) console.error(error);
        }
    }

    function spinRoulette() {
        const isChainMode = document.getElementById("chain-mode-toggle").checked;
        const areaFilter = document.getElementById("area-select").value;
        const genreFilter = document.getElementById("genre-select").value;
        const statusFilter = document.getElementById("status-select").value;

        const activeFilterTimes = [];
        if (document.getElementById("filter-time-morning").checked) activeFilterTimes.push("朝");
        if (document.getElementById("filter-time-lunch").checked) activeFilterTimes.push("昼");
        if (document.getElementById("filter-time-dinner").checked) activeFilterTimes.push("夜");

        const filteredList = gourmetDatabase.filter(item => {
            if (isChainMode) {
                return item.isChain;
            } else {
                const matchArea = (areaFilter === "すべて" || item.area === areaFilter);
                const matchGenre = (genreFilter === "すべて" || item.genre === genreFilter);
                const matchStatus = (statusFilter === "すべて" || item.status === statusFilter);
                const matchTime = item.time.some(t => activeFilterTimes.includes(t));
                return matchArea && matchTime && matchGenre && matchStatus && !item.isChain;
            }
        });

        const nameDiv = document.getElementById("result-name");
        const metaDiv = document.getElementById("result-meta");

        if (filteredList.length === 0) {
            nameDiv.innerText = "見つかりません…";
            metaDiv.innerText = isChainMode ? "チェーン店が登録されていません" : "条件を少しゆるめてみてね";
            return;
        }

        let count = 0;
        const interval = setInterval(() => {
            const randomIndex = Math.floor(Math.random() * filteredList.length);
            const currentItem = filteredList[randomIndex];
            nameDiv.innerText = currentItem.name;
            metaDiv.innerText = currentItem.isChain ? "🍔 定番のチェーン店！" : `[${currentItem.area}] ${currentItem.genre} (${currentItem.status})`;
            
            count++;
            if (count > 12) { clearInterval(interval); }
        }, 70);
    }

    initApp();
</script>

</body>
</html>
